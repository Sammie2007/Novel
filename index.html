<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jinwah: Voidheart</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:wght@300;400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root { --bg:#00000a; --text:#ccc8e0; --accent:#00f0ff; --border:rgba(0,240,255,0.1); }
body { background:var(--bg); color:var(--text); font-family:'Cormorant Garamond', serif; margin:0; }
nav { padding:1.5rem; border-bottom:1px solid var(--border); text-align:center; }
.logo { font-family:'Cinzel Decorative'; color:var(--accent); text-decoration:none; letter-spacing:3px; font-size:1.5rem; }
#main-ui, #reader-ui { padding:2rem; max-width:800px; margin:0 auto; }
.card { border:1px solid var(--border); padding:1.5rem; margin-bottom:1rem; cursor:pointer; background:rgba(0,240,255,0.02); }
.card:hover { border-color:var(--accent); }
.btn { background:none; border:1px solid var(--accent); color:var(--accent); padding:0.6rem 1.2rem; font-family:'Share Tech Mono'; cursor:pointer; text-transform:uppercase; }
#chapter-text { font-size:1.3rem; line-height:1.9; white-space: pre-wrap; font-weight:300; margin-top:2rem; }
</style>
</head>
<body>

<nav><a href="#" class="logo">VOIDHEART</a></nav>

<div id="main-ui">
  <h2 style="font-family:'Cinzel Decorative'; color:#fff; border-bottom:1px solid var(--border); padding-bottom:1rem;">THE ARCHIVE</h2>
  
  <div class="card" onclick="openChapter(1)">
    <h3 style="color:var(--accent)">Chapter I</h3>
    <p>The Awakening Void...</p>
  </div>

  <div class="card" onclick="openChapter(2)">
    <h3 style="color:var(--accent)">Chapter II</h3>
    <p>Eyes of the Ossuary...</p>
  </div>

  <div class="card" onclick="openChapter(10)">
    <h3 style="color:var(--accent)">Chapter X</h3>
    <p>The Convergence...</p>
  </div>
</div>

<div id="reader-ui" style="display:none;">
  <button class="btn" onclick="closeReader()">← Close Fragment</button>
  <div id="chapter-text">Searching the Void...</div>
</div>

<script>
async function openChapter(num) {
  document.getElementById('main-ui').style.display = 'none';
  document.getElementById('reader-ui').style.display = 'block';
  const content = document.getElementById('chapter-text');
  
  try {
    // This fetches the exact file "Chapter 1.txt" from your repo
    const res = await fetch(`Chapter ${num}.txt`);
    if (!res.ok) throw new Error();
    content.innerText = await res.text();
    window.scrollTo(0,0);
  } catch (e) {
    content.innerText = "Error: The Void has consumed this file. Check the filename!";
  }
}

function closeReader() {
  document.getElementById('main-ui').style.display = 'block';
  document.getElementById('reader-ui').style.display = 'none';
}
</script>
</body>
</html>
