<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jinwah: Voidheart</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:wght@300;400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root { --bg:#00000a; --text:#ccc8e0; --accent:#00f0ff; --border:rgba(0,240,255,0.1); }
body { background:var(--bg); color:var(--text); font-family:'Cormorant Garamond', serif; margin:0; transition: 0.5s; }
nav { padding:1.5rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; }
.logo { font-family:'Cinzel Decorative'; color:var(--accent); text-decoration:none; letter-spacing:2px; }
#main-ui, #reader-ui { padding:2rem; max-width:800px; margin:0 auto; }
.card { border:1px solid var(--border); padding:1.5rem; margin-bottom:1rem; cursor:pointer; }
.btn { background:none; border:1px solid var(--accent); color:var(--accent); padding:0.5rem 1rem; font-family:'Share Tech Mono'; cursor:pointer; }
#chapter-text { font-size:1.25rem; line-height:1.8; white-space: pre-wrap; }
</style>
</head>
<body>

<nav>
  <a href="#" class="logo">VOIDHEART</a>
  <div id="nav-ops"></div>
</nav>

<div id="main-ui">
  <h1 style="font-family:'Cinzel Decorative'">The Archive</h1>
  <div class="card" onclick="openChapter(1, 'The Awakening Void')">
    <h3>Chapter I: The Awakening Void</h3>
    <p>Read the first fragment of the journey...</p>
  </div>
  <div class="card" onclick="openChapter(2, 'Eyes of the Ossuary')">
    <h3>Chapter II: Eyes of the Ossuary</h3>
    <p>The Voidan Ossuary makes contact...</p>
  </div>
</div>

<div id="reader-ui" style="display:none;">
  <button class="btn" onclick="closeReader()">← Back to Archive</button>
  <h1 id="active-title" style="font-family:'Cinzel Decorative'; margin-top:2rem;"></h1>
  <div id="chapter-text">Loading from the Void...</div>
</div>

<script>
async function openChapter(num, title) {
  document.getElementById('main-ui').style.display = 'none';
  document.getElementById('reader-ui').style.display = 'block';
  document.getElementById('active-title').innerText = title;
  const content = document.getElementById('chapter-text');
  
  try {
    const res = await fetch(`chapters/chapter${num}.txt`);
    if (!res.ok) throw new Error();
    content.innerText = await res.text();
  } catch (e) {
    content.innerText = "Error: This chapter remains hidden in the Void.";
  }
}

function closeReader() {
  document.getElementById('main-ui').style.display = 'block';
  document.getElementById('reader-ui').style.display = 'none';
}
</script>
</body>
</html>
